<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>big dan's blog</title>

    <!-- favicon for browser tabs -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- global styles -->
    <link rel="stylesheet" href="styles.css" />
  </head>

  <!-- data-page used for page-specific logic/styles -->
  <body data-page="index">
    <!-- main app -->
    <div id="app-layer" class="page-root">
      <header>
        <div class="header-top">
          <div>
            <h1 class="site-title">big dan's blog</h1>
            <p class="site-tagline">unfiltered takes on film &amp; tv</p>
          </div>
        </div>

        <!-- primary navigation -->
        <nav>
          <button class="tab-button active" data-target="about">about</button>
          <button class="tab-button" data-target="reviews">reviews</button>
          <span class="nav-spacer"></span>
          <button class="tab-button" data-target="admin">admin</button>

        </nav>
      </header>

      <main>
        <!-- about tab -->
        <section id="about" class="panel">
          <h2>about</h2>

          <div class="about-body">
            <p id="about-text"></p>
            <p id="about-status" class="about-status"></p>
          </div>
        </section>

        <!-- reviews tab -->
        <section id="reviews" class="panel hidden">
          <h2>reviews</h2>
          <div id="posts"></div>
        </section>

        <!-- admin tab (embedded, no redirect) -->
        <section id="admin" class="panel hidden">
          <div data-page="admin" class="admin-embedded-root">
            <div class="page">
              <header class="admin-header">
                <div class="admin-header-copy">
                  <h2 class="admin-title">admin</h2>
                  <p class="logged-in-note" id="user-info"></p>
                </div>
                <button
                  id="logout-button"
                  class="button button-secondary hidden"
                  type="button"
                >
                  sign out
                </button>
              </header>

              <section class="card hidden" id="login-section">
                <form id="login-form">
                  <div class="field">
                    <label for="login-email">email</label>
                    <input
                      id="login-email"
                      type="email"
                      autocomplete="email"
                      required
                    />
                  </div>

                  <div class="field">
                    <label for="login-password">password</label>
                    <input
                      id="login-password"
                      type="password"
                      autocomplete="current-password"
                      required
                    />
                  </div>

                  <button type="submit" class="button">continue</button>
                  <div id="login-message"></div>
                </form>
              </section>

              <section class="card hidden" id="about-section">
                <h2 class="section-title">edit about page</h2>

                <form id="about-form">
                  <div class="field">
                    <label for="about-content">about text</label>
                    <textarea
                      id="about-content"
                      placeholder="write the about page text here..."
                      required
                    ></textarea>
                  </div>

                  <button type="submit" class="button">save about page</button>
                  <div id="about-message"></div>
                </form>
              </section>

              <section class="card hidden" id="post-section">
                <h2 class="section-title">new review</h2>

                <form id="post-form">
                  <div class="field">
                    <label for="post-title">title</label>
                    <input
                      id="post-title"
                      type="text"
                      placeholder="review title"
                      required
                    />
                  </div>

                  <div class="field">
                    <label for="post-media-title">
                      film / show title (for poster)
                    </label>
                    <input
                      id="post-media-title"
                      type="text"
                      placeholder="e.g. Regular Show"
                    />
                  </div>

                  <div class="field">
                    <label for="post-content">content</label>
                    <textarea
                      id="post-content"
                      placeholder="thoughts, reactions, notes..."
                      required
                    ></textarea>
                  </div>

                  <div class="actions-row">
                    <button
                      type="submit"
                      class="button"
                      id="post-submit-button"
                    >
                      publish review
                    </button>

                    <button
                      type="button"
                      class="button button-secondary hidden"
                      id="cancel-edit-button"
                    >
                      cancel edit
                    </button>
                  </div>

                  <div id="post-message"></div>
                </form>

                <div class="post-list" id="post-list"></div>
              </section>
            </div>
          </div>
        </section>
      </main>

      <footer>built by aidan · for dan</footer>
    </div>

    <!-- app logic -->
    <script type="module" src="app.js"></script>
  </body>
</html>
